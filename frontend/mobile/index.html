<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a2342">
<title>SATHI – JLN Hospital Map</title>
<link rel="manifest" href="/manifest.json">
<script src="/assets/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a2342;
  --teal: #0d6e8a;
  --teal-light: #1a9ab8;
  --gold: #e8a020;
  --bg: #041624;
  --card: rgba(10,35,66,0.9);
  --white: #f8fafc;
  --blue-strip: #1565c0;
  --yellow-strip: #f9a825;
  --red-strip: #c62828;
  --green-strip: #2e7d32;
  --font-en: 'Exo 2', sans-serif;
  --font-hi: 'Noto Sans Devanagari', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-en);
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
}

/* Header */
.header {
  background: rgba(4,22,36,0.95);
  border-bottom: 2px solid rgba(13,110,138,0.4);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.header-icon { font-size: 28px; }
.header-text h1 { font-size: 14px; font-weight: 800; letter-spacing: 1.5px; color: var(--teal-light); }
.header-text p { font-size: 11px; color: rgba(255,255,255,0.5); font-family: var(--font-hi); }

/* Department info card */
.dept-card {
  margin: 14px 14px 0;
  background: var(--card);
  border: 1px solid rgba(13,110,138,0.35);
  border-radius: 16px;
  overflow: hidden;
}
.dept-strip-bar { height: 5px; width: 100%; }
.dept-strip-bar.blue { background: var(--blue-strip); }
.dept-strip-bar.yellow { background: var(--yellow-strip); }
.dept-strip-bar.red { background: var(--red-strip); }
.dept-strip-bar.green { background: var(--green-strip); }

.dept-card-body { padding: 16px; }
.dept-name { font-size: 20px; font-weight: 800; }
.dept-name-hi { font-family: var(--font-hi); font-size: 15px; color: rgba(255,255,255,0.6); margin-top: 3px; }
.dept-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.tag {
  background: rgba(13,110,138,0.2); border: 1px solid rgba(13,110,138,0.4);
  border-radius: 50px; padding: 4px 12px; font-size: 11px; font-weight: 600;
}
.tag.strip-tag { font-weight: 700; }
.tag.strip-tag.blue { background: rgba(21,101,192,0.2); border-color: var(--blue-strip); color: #90caf9; }
.tag.strip-tag.yellow { background: rgba(249,168,37,0.2); border-color: var(--yellow-strip); color: #ffe082; }
.tag.strip-tag.red { background: rgba(198,40,40,0.2); border-color: var(--red-strip); color: #ef9a9a; }
.tag.strip-tag.green { background: rgba(46,125,50,0.2); border-color: var(--green-strip); color: #a5d6a7; }

/* Info rows */
.info-section { margin: 14px; background: rgba(255,255,255,0.04); border-radius: 14px; overflow: hidden; }
.info-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.info-row:last-child { border-bottom: none; }
.info-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; margin-top: 1px; }
.info-content { flex: 1; }
.info-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
.info-value { font-size: 14px; font-weight: 600; margin-top: 2px; }
.info-value-hi { font-family: var(--font-hi); font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* Map section */
.map-section { margin: 14px; }
.map-section h3 { font-size: 14px; font-weight: 700; color: var(--teal-light); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.map-img {
  width: 100%; border-radius: 12px;
  border: 1px solid rgba(13,110,138,0.3);
  display: block;
}
.map-fallback {
  width: 100%; aspect-ratio: 4/3;
  background: rgba(13,110,138,0.12);
  border: 2px dashed rgba(13,110,138,0.35);
  border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: rgba(255,255,255,0.35); font-size: 13px; text-align: center; padding: 20px;
}

/* Dept image */
.dept-photo-section { margin: 14px; }
.dept-photo-section h3 { font-size: 14px; font-weight: 700; color: var(--teal-light); margin-bottom: 10px; }
.dept-photo {
  width: 100%; border-radius: 12px; aspect-ratio: 16/9; object-fit: cover;
  border: 1px solid rgba(13,110,138,0.3);
}
.dept-photo-fallback {
  width: 100%; aspect-ratio: 16/9;
  background: rgba(13,110,138,0.12); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; border: 1px solid rgba(13,110,138,0.3);
}

/* Strip guide */
.strip-guide-section {
  margin: 14px;
  background: rgba(255,255,255,0.04);
  border-radius: 14px; padding: 14px;
}
.strip-guide-section h3 { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 12px; }
.strip-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.strip-bar { width: 32px; height: 8px; border-radius: 4px; flex-shrink: 0; }
.strip-bar.blue { background: var(--blue-strip); }
.strip-bar.yellow { background: var(--yellow-strip); }
.strip-bar.red { background: var(--red-strip); }
.strip-bar.green { background: var(--green-strip); }
.strip-label { font-size: 12px; font-weight: 600; }
.strip-label-hi { font-family: var(--font-hi); font-size: 11px; color: rgba(255,255,255,0.5); }

/* Footer */
.footer { padding: 20px 14px; text-align: center; color: rgba(255,255,255,0.35); font-size: 11px; line-height: 1.7; }
.sos-fab {
  position: fixed; bottom: 20px; right: 16px;
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #b71c1c, #e53935);
  border-radius: 50%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(198,40,40,0.5);
  text-decoration: none; gap: 2px;
  animation: pulse 2s infinite;
}
.sos-fab span:first-child { font-size: 22px; }
.sos-fab span:last-child { font-size: 8px; font-weight: 800; color: #fff; letter-spacing: 1px; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(198,40,40,0.5); }
  50% { box-shadow: 0 4px 40px rgba(198,40,40,0.8); }
}

/* Loading */
.loading { padding: 60px 20px; text-align: center; color: rgba(255,255,255,0.4); }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Lang toggle */
.lang-row { display: flex; gap: 8px; margin: 10px 14px 0; }
.lang-btn {
  flex: 1; padding: 10px; background: rgba(13,110,138,0.15);
  border: 1px solid rgba(13,110,138,0.3); border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer; color: var(--white);
  transition: all 0.2s; text-align: center;
}
.lang-btn.active { background: var(--teal); border-color: var(--teal); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏥</div>
  <div class="header-text">
    <h1>SATHI – JLN HOSPITAL</h1>
    <p>जवाहरलाल नेहरू चिकित्सालय, अजमेर</p>
  </div>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading department info...</div>
  </div>
</div>

<!-- SOS FAB -->
<a href="tel:01452625000" class="sos-fab">
  <span>🚨</span>
  <span>SOS</span>
</a>

<script>
const API = (window.SATHI && window.SATHI.API_BASE) ||
  (window.location.hostname === 'localhost' ? 'http://localhost:5000' : '');

let currentLang = 'hi';

const imgMap = {
  'opd_registration': '5.jpeg', 'eye_opd': '5.jpeg', 'ent_opd': '5.jpeg',
  'geriatric': '5.jpeg', 'orthopaedic': '5.jpeg', 'emergency': '5.jpeg',
  'cardiology': '9.jpeg', 'blood_bank': '8.jpeg', 'drug_distribution': '8.jpeg',
  'medicine_center': '12.jpeg', 'admin': '11.jpeg', 'canteen': '10.jpeg',
  'pediatrics': '13.jpeg', 'xray_pathology': '7.jpeg', 'mri_ct': '7.jpeg'
};

async function init() {
  const params = new URLSearchParams(window.location.search);
  const deptId = params.get('dept');

  if (!deptId) {
    renderHome();
    return;
  }

  try {
    const res = await fetch(`${API}/api/department/${deptId}`);
    const dept = await res.json();
    if (dept.error) { renderNotFound(); return; }
    renderDept(dept);
  } catch (e) {
    renderError();
  }
}

function renderDept(dept) {
  const imgFile = imgMap[dept.id] || null;
  const imgHTML = imgFile
    ? `<img src="/assets/images/${imgFile}" class="dept-photo" alt="${dept.name}" onerror="this.style.display='none'">`
    : `<div class="dept-photo-fallback">🏥</div>`;

  document.getElementById('app').innerHTML = `
    <div class="lang-row">
      <div class="lang-btn ${currentLang==='en'?'active':''}" onclick="setLang('en')">English</div>
      <div class="lang-btn ${currentLang==='hi'?'active':''}" onclick="setLang('hi')">हिंदी</div>
      <div class="lang-btn ${currentLang==='mr'?'active':''}" onclick="setLang('mr')">मारवाड़ी</div>
    </div>

    <div class="dept-card">
      <div class="dept-strip-bar ${dept.strip_color}"></div>
      <div class="dept-card-body">
        <div class="dept-name">${dept.name}</div>
        <div class="dept-name-hi">${dept.hindi}</div>
        <div class="dept-tags">
          <span class="tag strip-tag ${dept.strip_color}">Follow ${dept.strip_label}</span>
          <span class="tag">🚪 ${dept.gate}</span>
          <span class="tag">🏢 ${dept.floor}</span>
        </div>
      </div>
    </div>

    <div class="info-section">
      <div class="info-row">
        <div class="info-icon">🚪</div>
        <div class="info-content">
          <div class="info-label">Enter From</div>
          <div class="info-value">${dept.gate}</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">🏢</div>
        <div class="info-content">
          <div class="info-label">Floor / Block</div>
          <div class="info-value">${dept.floor}</div>
          <div class="info-value">${dept.building}</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">📌</div>
        <div class="info-content">
          <div class="info-label">Landmark</div>
          <div class="info-value">${dept.landmark}</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">🗺️</div>
        <div class="info-content">
          <div class="info-label">Directions</div>
          <div class="info-value" style="font-size:13px; line-height:1.5;">${dept.directions}</div>
          <div class="info-value-hi">${dept.directions_hindi}</div>
        </div>
      </div>
    </div>

    <div class="map-section">
      <h3>🗺️ Hospital Map</h3>
      <img src="/assets/images/map.jpg" class="map-img" alt="Hospital Map"
        onerror="this.style.display='none'; document.getElementById('map-fb').style.display='flex'">
      <div class="map-fallback" id="map-fb" style="display:none;">
        <span style="font-size:40px;">🗺️</span>
        <span>Hospital Map</span>
        <span style="font-size:10px;">Add map.jpg to assets/images/</span>
      </div>
    </div>

    <div class="dept-photo-section">
      <h3>📷 ${dept.name}</h3>
      ${imgHTML}
    </div>

    <div class="strip-guide-section">
      <h3>Floor Strip Color Guide</h3>
      <div class="strip-item"><div class="strip-bar blue"></div><div><div class="strip-label">Blue = OPD Departments</div><div class="strip-label-hi">नीला = ओपीडी विभाग</div></div></div>
      <div class="strip-item"><div class="strip-bar yellow"></div><div><div class="strip-label">Yellow = Services</div><div class="strip-label-hi">पीला = सेवाएं</div></div></div>
      <div class="strip-item"><div class="strip-bar red"></div><div><div class="strip-label">Red = Emergency</div><div class="strip-label-hi">लाल = आपातकाल</div></div></div>
      <div class="strip-item"><div class="strip-bar green"></div><div><div class="strip-label">Green = Diagnostics</div><div class="strip-label-hi">हरा = जांच (लैब, एक्स-रे)</div></div></div>
    </div>

    <div class="footer">
      <div>📞 Helpline: 0145-2625000</div>
      <div>JLN Hospital Road, Ajmer, Rajasthan – 305001</div>
      <div style="margin-top:6px; color:rgba(255,255,255,0.2);">Powered by SATHI Navigation System</div>
    </div>
  `;
}

function renderHome() {
  document.getElementById('app').innerHTML = `
    <div style="padding:20px 14px; text-align:center;">
      <div style="font-size:48px; margin-bottom:16px;">🏥</div>
      <h2 style="font-size:18px; font-weight:800; color:var(--teal-light);">SATHI – JLN Hospital Ajmer</h2>
      <p style="font-family:var(--font-hi); font-size:14px; color:rgba(255,255,255,0.5); margin-top:6px;">जवाहरलाल नेहरू चिकित्सालय, अजमेर</p>
      <p style="font-size:13px; color:rgba(255,255,255,0.4); margin-top:16px;">Scan a department QR code at the kiosk to view navigation details here.</p>
    </div>
  `;
}

function renderNotFound() {
  document.getElementById('app').innerHTML = `<div style="padding:40px; text-align:center; color:rgba(255,255,255,0.4);"><div style="font-size:48px; margin-bottom:12px;">❓</div><div>Department not found. Please scan a valid QR code.</div></div>`;
}
function renderError() {
  document.getElementById('app').innerHTML = `<div style="padding:40px; text-align:center; color:rgba(255,255,255,0.4);"><div style="font-size:48px; margin-bottom:12px;">⚠️</div><div>Could not load data. Please check your connection.</div></div>`;
}

function setLang(lang) {
  currentLang = lang;
  // Re-render with same dept
  const params = new URLSearchParams(window.location.search);
  const deptId = params.get('dept');
  if (deptId) init();
}

init();

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
