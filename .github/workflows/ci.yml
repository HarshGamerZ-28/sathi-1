name: SATHI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Flask Backend – Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest

      - name: Run API tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || python -c "
          from app import app
          import json

          client = app.test_client()

          # Health check
          r = client.get('/api/health')
          assert r.status_code == 200, 'Health check failed'
          assert r.get_json()['status'] == 'ok'
          print('✅ Health check passed')

          # Departments list
          r = client.get('/api/departments')
          data = r.get_json()
          assert len(data['departments']) > 0, 'No departments found'
          assert len(data['gates']) > 0, 'No gates found'
          print(f'✅ Departments: {len(data[\"departments\"])} found')

          # Search
          r = client.get('/api/search?q=fever')
          results = r.get_json()['results']
          assert len(results) > 0, 'Search returned no results'
          print(f'✅ Search for fever: {len(results)} results')

          # Single department
          r = client.get('/api/department/opd_registration')
          dept = r.get_json()
          assert dept['id'] == 'opd_registration'
          print(f'✅ Department detail: {dept[\"name\"]}')

          # Slip generation
          r = client.post('/api/slip',
            data=json.dumps({'dept_id': 'opd_registration', 'name': 'Test'}),
            content_type='application/json')
          slip = r.get_json()
          assert 'slip_no' in slip
          print(f'✅ Slip generation: #{slip[\"slip_no\"]}')

          # Emergency SOS
          r = client.post('/api/emergency',
            data=json.dumps({'location': 'CI Test'}),
            content_type='application/json')
          assert r.get_json()['status'] == 'alert_sent'
          print('✅ Emergency SOS endpoint')

          print()
          print('🎉 All backend tests passed!')
          "

  # ── Frontend Validation ──────────────────────────────────────────────────
  frontend-check:
    name: Frontend – HTML Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check all HTML files exist
        run: |
          echo "Checking frontend files..."
          test -f frontend/kiosk/index.html   && echo "✅ kiosk/index.html"
          test -f frontend/mobile/index.html  && echo "✅ mobile/index.html"
          test -f frontend/website/index.html && echo "✅ website/index.html"
          test -f frontend/assets/config.js   && echo "✅ assets/config.js"
          test -f frontend/assets/keyboard.js && echo "✅ assets/keyboard.js"
          test -f frontend/manifest.json      && echo "✅ manifest.json"
          test -f frontend/sw.js              && echo "✅ sw.js (Service Worker)"

      - name: Check departments data
        run: |
          python3 -c "
          import json
          with open('backend/data/departments.json') as f:
            data = json.load(f)
          depts = data['departments']
          gates = data['gates']
          print(f'✅ departments.json valid: {len(depts)} departments, {len(gates)} gates')

          # Validate required fields
          required = ['id','name','hindi','category','strip_color','gate','gate_id','floor','directions']
          for d in depts:
            for field in required:
              assert field in d, f'Missing field {field} in {d.get(\"id\",\"?\")}' 
          print('✅ All department fields validated')
          "

      - name: Check config has Render URL placeholder
        run: |
          grep -q 'RENDER_URL' frontend/assets/config.js && echo "✅ config.js has RENDER_URL"
          grep -q 'SATHI_CONFIG' frontend/assets/config.js && echo "✅ config.js exports SATHI_CONFIG"

  # ── Deployment summary ───────────────────────────────────────────────────
  deploy-info:
    name: Deployment Checklist
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Print deployment guide
        run: |
          echo "============================================"
          echo "  SATHI – Ready for Deployment"
          echo "============================================"
          echo ""
          echo "Backend → Render:"
          echo "  1. Connect repo at render.com"
          echo "  2. Root Dir: backend"
          echo "  3. Start: gunicorn app:app --bind 0.0.0.0:\$PORT"
          echo ""
          echo "Frontend → Vercel:"
          echo "  1. Connect repo at vercel.com"  
          echo "  2. vercel.json handles routing automatically"
          echo "  3. Update RENDER_URL in frontend/assets/config.js"
          echo ""
          echo "Pages:"
          echo "  /         → Public website"
          echo "  /kiosk    → Touch-screen kiosk"
          echo "  /mobile   → QR scan mobile page (PWA)"
          echo "============================================"
